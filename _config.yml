title: Gabriel Peiretti
email: gabrielpeiretti@gmail.com
description: >-
  Mechanical engineering portfolio of Gabriel Peiretti, Boston University 2021.
  Projects in product design, mechatronics, 3D printing, and manufacturing.
url: "https://PeirettiG.github.io"
baseurl: "/Portfolio"
twitter_username:
github_username: PeirettiG
minimal_mistakes_skin: dark
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: America/New_York

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-remote-theme

author:
  name   : "Gabriel Peiretti"
  avatar : "/assets/images/Headshot.jpg"
  bio    : "Mechanical Engineer specializing in design and integration of electromechanical components, simulation, & analysis."
  location: "Watertown, MA"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:gabrielpeiretti@gmail.com"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/gabriel-peiretti-52897a18a/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/PeirettiG"

footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/gabriel-peiretti-52897a18a/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/PeirettiG"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:gabrielpeiretti@gmail.com"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: false
      comments: false
      share: false
      related: false
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

